<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>A-Mart Offers</title>
    <meta name="description" content="Current grocery offers by category.">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="assets/styles.css?v=20260719-1">
  </head>
  <body data-page="home">
    <main class="page-shell">
      <header class="page-header">
        <div class="brand-heading">
          <div class="logo-card">
            <img class="site-logo" src="assets/logo.png" alt="A-Mart logo">
          </div>
          <div>
            <p class="eyebrow">Daily grocery offers</p>
            <h1>A-Mart</h1>
          </div>
        </div>
        <p id="updated-at" class="muted">Loading today's offers...</p>
      </header>

      <section aria-labelledby="categories-title">
        <h2 id="categories-title">Shop offers by category</h2>
        <div id="category-list" class="category-list" aria-live="polite"></div>
      </section>

      <section class="request-section" aria-labelledby="request-title">
        <h2 id="request-title">Need something else?</h2>
        <a class="category-button request-button" href="https://forms.gle/REPLACE_WITH_YOUR_FORM_ID" target="_blank" rel="noreferrer">Request an Item</a>
      </section>

      <section class="contact-card" aria-labelledby="contact-title">
        <h2 id="contact-title">Contact Details</h2>
        <p><strong>Address:</strong> Add your shop address here</p>
        <p><strong>Email:</strong> <a href="mailto:your-email@example.com">your-email@example.com</a></p>
        <p><strong>Phone:</strong> <a href="tel:+910000000000">+91 00000 00000</a></p>
      </section>

      <p id="status-message" class="status" role="status"></p>
    </main>

    <script src="assets/app.js?v=20260719-1"></script>
  </body>
</html>
