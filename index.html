<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>A-Mart Offers</title>
    <meta name="description" content="Current grocery offers by category.">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body data-page="home">
    <main class="page-shell">
      <header class="page-header">
        <div class="brand-heading">
          <div class="logo-card">
            <img class="site-logo" src="assets/logo.png" alt="A-Mart logo">
          </div>
          <div>
            <p class="eyebrow">Daily grocery offers</p>
            <h1>A-Mart</h1>
          </div>
        </div>
        <p id="updated-at" class="muted">Loading today's offers...</p>
      </header>

      <section aria-labelledby="categories-title">
        <h2 id="categories-title">Shop offers by category</h2>
        <div id="category-list" class="category-list" aria-live="polite"></div>
      </section>

      <p id="status-message" class="status" role="status"></p>
    </main>

    <script src="assets/app.js"></script>
  </body>
</html>
